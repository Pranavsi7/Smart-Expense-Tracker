version: "3.9"

# Loads variables from .env automatically
services:

  # ── PostgreSQL ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: expense-postgres          # matches DB_HOST in .env
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"                     # host 5435 → container 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: expense-redis             # matches REDIS_HOST in .env
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override host references so backend talks to Docker service names
      DB_HOST:    expense-postgres
      REDIS_HOST: expense-redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React + TypeScript Frontend ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
